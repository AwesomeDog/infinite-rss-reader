<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Infinite RSS Reader</title>
    <link rel="icon"
          href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><rect x='2' y='3' width='20' height='18' fill='%23fff' stroke='%23333' stroke-width='1.5' rx='1'/><rect x='4' y='5' width='16' height='3' fill='%23333'/><text x='12' y='7.5' font-family='Arial' font-size='2.5' font-weight='bold' text-anchor='middle' fill='%23fff'>NEWS</text><rect x='4' y='9' width='7' height='1' fill='%23333'/><rect x='13' y='9' width='7' height='1' fill='%23333'/><rect x='4' y='11' width='7' height='1' fill='%23333'/><rect x='13' y='11' width='7' height='1' fill='%23333'/><rect x='4' y='13' width='16' height='1' fill='%23333'/><rect x='4' y='15' width='16' height='1' fill='%23333'/><rect x='4' y='17' width='12' height='1' fill='%23333'/></svg>"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.28.4/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dayjs/1.11.18/dayjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/antd/5.27.4/antd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/antd/5.27.4/reset.min.css"/>
    <style>
        .main-content {
            padding: 0 25%;
            margin: 24px 0;
        }

        .stats-panel {
            position: fixed;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 1000;
        }

        .stats-toggle-btn {
            display: none;
        }

        .rss-item {
            margin-bottom: 24px;
        }

        .rss-item * {
            max-width: 100%;
            height: auto;
            box-sizing: border-box;
        }

        .rss-item .ant-card {
            transition: all 0.3s ease;
        }

        .rss-item.unread .ant-card {
            border-color: #696FC7;
            box-shadow: 0 2px 8px #A7AAE1;
            border-radius: 8px;
        }

        .rss-item.read .ant-card {
            border-style: dashed;
            border-color: #d9d9d9;
            box-shadow: none;
        }

        .rss-item .ant-card:hover {
            border-color: #fa8c16 !important;
            box-shadow: 0 4px 12px rgba(250, 140, 22, 0.3) !important;
        }

        .date-link:hover {
            opacity: 0.7;
        }

        .rss-item .ant-card-head-title {
            white-space: normal !important;
            word-wrap: break-word;
        }

        .rss-item .ant-card-body {
            word-wrap: break-word;
        }

        .rss-item-content {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .rss-item-content table {
            max-width: none;
            border-collapse: collapse;
        }

        .rss-item-content table,
        .rss-item-content th,
        .rss-item-content td {
            word-break: break-word;
        }

        .rss-item-body {
            position: relative;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .rss-item-body.minimized {
            max-height: 120px;
        }

        .rss-item-body-fade {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 50px;
            pointer-events: none;
            background: linear-gradient(transparent, var(--ant-color-bg-container, #ffffff));
        }

        @media (max-width: 768px) {
            .main-content {
                padding: 0 16px;
            }

            .stats-panel {
                display: none;
            }

            .stats-panel.visible {
                display: block;
            }

            .stats-toggle-btn {
                display: block;
            }

        }

        @media (min-width: 1400px) {
            .main-content {
                padding: 0 10%;
                overflow-x: hidden;
            }

            .rss-list-container .ant-list-items {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 24px;
            }

            .rss-list-container .rss-item {
                margin-bottom: 0;
                min-width: 0;
                overflow: hidden;
            }
        }

        @media (min-width: 1700px) {
            .rss-list-container .ant-list-items {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (min-width: 2000px) {
            .main-content {
                padding: 0 5%;
            }

            .rss-list-container .ant-list-items {
                grid-template-columns: repeat(4, 1fr);
            }
        }
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
    const {useState, useEffect, useRef, useCallback, useMemo} = React;
    const {
        Layout, Divider, List, Card, Typography, Spin, Tag, Button, ConfigProvider,
        theme, Statistic, FloatButton, message, Tooltip, Switch, Space, Modal, Tree, Input
    } = antd;
    const {DirectoryTree} = Tree;
    const {Content} = Layout;
    const {Text} = Typography;

    const useDarkMode = () => {
        const [themeMode, setThemeMode] = useState(() => localStorage.getItem("themeMode") || (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light"));
        useEffect(() => localStorage.setItem("themeMode", themeMode), [themeMode]);
        return {themeMode, toggleTheme: () => setThemeMode((m) => (m === "light" ? "dark" : "light"))};
    };

    const useScreenshotMode = () => {
        const [screenshotMode, setScreenshotMode] = useState(() => localStorage.getItem("screenshotMode") !== "false");
        useEffect(() => localStorage.setItem("screenshotMode", screenshotMode), [screenshotMode]);
        return {screenshotMode, toggleScreenshotMode: () => setScreenshotMode((m) => !m)};
    };

    const useCardMode = () => {
        const [cardMode, setCardMode] = useState(() => localStorage.getItem("cardMode") || "standard");
        useEffect(() => localStorage.setItem("cardMode", cardMode), [cardMode]);
        return {cardMode, toggleCardMode: () => setCardMode((m) => (m === "standard" ? "compact" : "standard"))};
    };

    const useBlockWords = () => {
        const [blockWords, setBlockWords] = useState(() => localStorage.getItem("blockWords") || "");
        useEffect(() => localStorage.setItem("blockWords", blockWords), [blockWords]);
        return {blockWords, setBlockWords};
    };

    const fetchUnreadItems = async () => (await fetch("/api/rss/unread").then((r) => r.json())).data || [];
    const fetchSingleItem = async (itemId) => (await fetch(`/api/rss/item?itemId=${itemId}`).then((r) => r.json())).data || null;
    const fetchFolderItems = async (folder) => (await fetch(`/api/rss/folder?folder=${encodeURIComponent(folder)}`).then((r) => r.json())).data || [];
    const markItemAsRead = (itemId) => fetch(`/api/rss/mark-read?itemId=${itemId}`).catch(console.error);

    // Build folder tree from items with counts
    const buildFolderTree = (items) => {
        const folderCounts = {};
        items.forEach(item => {
            if (item.folderPath) {
                folderCounts[item.folderPath] = (folderCounts[item.folderPath] || 0) + 1;
            }
        });
        
        const tree = {};
        Object.keys(folderCounts).forEach(path => {
            const parts = path.split('/').filter(Boolean);
            let current = tree;
            let accumulatedPath = '';
            parts.forEach((part) => {
                accumulatedPath += '/' + part;
                if (!current[part]) current[part] = { children: {}, fullPath: accumulatedPath };
                current = current[part].children;
            });
        });
        
        const toTreeData = (obj) => {
            return Object.entries(obj).map(([name, data]) => {
                const key = data.fullPath || name;
                const children = toTreeData(data.children);
                const directCount = folderCounts[data.fullPath] || 0;
                const childrenCount = children.reduce((sum, child) => sum + (child.count || 0), 0);
                return {
                    title: name,
                    key: key,
                    fullPath: data.fullPath,
                    count: directCount + childrenCount,
                    children: children.length ? children : undefined
                };
            });
        };
        
        return toTreeData(tree);
    };

    const FolderTreeModal = ({ visible, onClose, treeData }) => {
        const handleSelect = (_, { node }) => {
            if (node.fullPath) {
                window.open(`/?unread=true&folder=${encodeURIComponent(node.fullPath)}`, '_blank');
            }
        };
        
        const titleRender = (node) => (
            <span>
                {node.title}
                {node.count > 0 && <Tag color="blue" style={{marginLeft: 8}}>{node.count}</Tag>}
            </span>
        );
        
        return (
            <Modal
                title="📁 Folder Navigation"
                open={visible}
                onCancel={onClose}
                footer={null}
            >
                {treeData.length > 0 ? (
                    <DirectoryTree
                        defaultExpandAll
                        treeData={treeData}
                        onSelect={handleSelect}
                        titleRender={titleRender}
                        style={{ overflow: 'auto' }}
                    />
                ) : (
                    <Text type="secondary">No folder data available</Text>
                )}
            </Modal>
        );
    };

    const StatsPanel = (
        {
            total,
            read,
            displayed,
            loading,
            themeMode,
            toggleTheme,
            screenshotMode,
            toggleScreenshotMode,
            cardMode,
            toggleCardMode,
            showStats,
            setShowFolderModal,
            setShowBlockWordsModal
        }) => (
        <Card className={`stats-panel ${showStats ? "visible" : ""}`} size="small" title="Statistics"
              headStyle={{textAlign: "center"}} bodyStyle={{textAlign: "center"}}>
            <Spin spinning={loading}>
                <Statistic title="Total" value={total}/>
                <Statistic title="Loaded" value={displayed}/>
                <Tooltip title="Items skipped during fast scrolling are not counted as read">
                    <div><Statistic title="Read" value={read}/></div>
                </Tooltip>
            </Spin>
            <Divider/>
            <div style={{display: "flex", flexDirection: "column", gap: 8}}>
                <Tooltip title={themeMode === "light" ? "Light Theme" : "Dark Theme"}>
                    <Switch style={{width: "100%"}} size="small" checkedChildren="☀️" unCheckedChildren="🌙"
                            checked={themeMode === "light"} onChange={toggleTheme}/>
                </Tooltip>
                <Tooltip title={screenshotMode ? "Screenshot Full Card" : "Screenshot Body Only"}>
                    <Switch style={{width: "100%"}} size="small" checkedChildren="📸 Full" unCheckedChildren="📸 Body"
                            checked={screenshotMode} onChange={toggleScreenshotMode}/>
                </Tooltip>
                <Tooltip title={cardMode === "standard" ? "Standard Interface" : "Compact Interface"}>
                    <Switch style={{width: "100%"}} size="small" checkedChildren="Standard" unCheckedChildren="Compact"
                            checked={cardMode === "standard"} onChange={toggleCardMode}/>
                </Tooltip>
                <Tooltip title="Browse Folders">
                    <Button size="small" onClick={() => setShowFolderModal(true)} style={{width: "100%"}}>📁 Folders</Button>
                </Tooltip>
                <Tooltip title="Manage block words">
                    <Button size="small" onClick={() => setShowBlockWordsModal(true)} style={{width: "100%"}}>🚫 Block</Button>
                </Tooltip>
            </div>
        </Card>
    );

    const BlockWordsModal = ({visible, onClose, blockWords, setBlockWords}) => {
        const [draft, setDraft] = useState(blockWords);
        useEffect(() => { if (visible) setDraft(blockWords); }, [visible]);
        return (
            <Modal
                title="🚫 Block Words"
                open={visible}
                onCancel={onClose}
                onOk={() => { setBlockWords(draft); onClose(); }}
                okText="Save"
                cancelText="Cancel"
            >
                <p><Text type="secondary">Comma-separated keywords. Matched items will be auto-minimized.</Text></p>
                <Input.TextArea rows={4} placeholder="keyword1, keyword2, keyword3" value={draft} onChange={e => setDraft(e.target.value)}/>
            </Modal>
        );
    };

    const sanitizeHtml = (html) => {
        const doc = new DOMParser().parseFromString(html, "text/html");
        doc.querySelectorAll('base,script,iframe,object,embed,form,input,button,link[rel="stylesheet"]').forEach((n) => n.remove());
        doc.querySelectorAll("*").forEach((el) => {
            [...el.attributes].forEach((attr) => {
                const name = attr.name.toLowerCase(), val = attr.value.toLowerCase();
                if (name.startsWith("on") || ((name === "href" || name === "src") && (val.startsWith("javascript:") || val.startsWith("data:")))) el.removeAttribute(name);
            });
        });
        return doc.body.innerHTML;
    };

    const RssItem = React.memo(({item, onBecameVisible, screenshotMode, cardMode, isRead, blockWordList}) => {
        const itemRef = useRef(null), contentRef = useRef(null), wasVisible = useRef(false);
        const [minimized, setMinimized] = useState(() => {
            if (!blockWordList || blockWordList.length === 0) return false;
            const text = ((item.subject || '') + ' ' + (item.body || '')).toLowerCase();
            return blockWordList.some(w => text.includes(w));
        });
        const isCompactMode = cardMode === "compact";

        useEffect(() => {
            const observer = new IntersectionObserver(([entry]) => {
                if (entry.isIntersecting) wasVisible.current = true;
                else if (wasVisible.current && entry.boundingClientRect.bottom < 0) {
                    onBecameVisible(item.id);
                    observer.disconnect();
                }
            }, {threshold: 0});
            itemRef.current && observer.observe(itemRef.current);
            return () => observer.disconnect();
        }, [item.id, onBecameVisible]);

        const handleScreenshot = async () => {
            const card = itemRef.current?.querySelector(".ant-card");
            const target = screenshotMode ? card : contentRef.current;
            if (!target) return message.error("No content to screenshot.");
            try {
                const canvas = await html2canvas(target, {
                    useCORS: true,
                    backgroundColor: card ? getComputedStyle(card).backgroundColor : null
                });
                const blob = await new Promise((r) => canvas.toBlob(r, "image/png"));
                blob ? (await navigator.clipboard.write([new ClipboardItem({"image/png": blob})]), message.success("Screenshot copied!")) : message.error("Failed.");
            } catch (e) {
                message.error("Screenshot failed.");
            }
        };

        const sanitizedBody = useMemo(() => (item.body ? sanitizeHtml(item.body) : ""), [item.body]);
        return (
            <div ref={itemRef} className={`rss-item ${isRead ? "read" : "unread"}`}>
                <Card 
                    title={item.subject || "No Title"}
                    extra={
                        <Space>
                            {!isCompactMode && <button type="button" title={minimized ? "Maximize" : "Minimize"} onClick={() => setMinimized(!minimized)} style={{background:'none',border:'none',cursor:'pointer',fontSize:14,padding:'4px 8px'}}>{minimized ? "➕" : "➖"}</button>}
                            <button type="button" title="Take Screenshot" onClick={handleScreenshot} style={{background:'none',border:'none',cursor:'pointer',fontSize:14,padding:'4px 8px'}}>📸</button>
                        </Space>
                    }
                >
                    {!isCompactMode && (
                        <div style={{marginTop: -16, marginBottom: 16}}>
                            {item.link && <a href={item.link} target="_blank" title="View Source" style={{marginRight: 8}}>🔍</a>}
                            {item.folderPath && (
                                <a href={`/?folder=${encodeURIComponent(item.folderPath)}`} target="_blank" style={{textDecoration: 'none'}}>
                                    <Tag color="blue" style={{marginRight: 8, cursor: 'pointer'}}>{item.folderPath}</Tag>
                                </a>
                            )}
                            {item.author && <Text type="secondary">✍️: {item.author} | </Text>}
                            {item.date && (
                                <a href={`/?itemId=${item.id}`} target="_blank" className="date-link" style={{textDecoration: 'none'}}>
                                    <Text type="secondary" style={{cursor: 'pointer'}}>{new Date(item.date).toLocaleString()}</Text>
                                </a>
                            )}
                        </div>
                    )}
                    <div className={`rss-item-body${minimized ? ' minimized' : ''}`}>
                        {sanitizedBody && <div ref={contentRef} className="rss-item-content" dangerouslySetInnerHTML={{__html: sanitizedBody}}/>}
                        {minimized && <div className="rss-item-body-fade"/>}
                    </div>
                </Card>
            </div>
        );
    });

    const useRssData = () => {
        const [allItems, setAllItems] = useState([]);
        const [loading, setLoading] = useState(true);

        useEffect(() => {
            let isMounted = true;
            (async () => {
                try {
                    const params = new URLSearchParams(window.location.search);
                    const itemId = params.get('itemId');
                    const folder = params.get('folder');
                    const unread = params.get('unread') === 'true';

                    let items = [];
                    if (itemId) {
                        const item = await fetchSingleItem(itemId);
                        items = item ? [item] : [];
                    } else if (folder && unread) {
                        const allUnread = await fetchUnreadItems();
                        items = allUnread.filter(item => 
                            item.folderPath === folder || 
                            item.folderPath.startsWith(folder)
                        );
                    } else if (folder) {
                        items = await fetchFolderItems(folder);
                    } else {
                        items = await fetchUnreadItems();
                    }
                    if (isMounted) setAllItems(items);
                } finally {
                    if (isMounted) setLoading(false);
                }
            })();
            return () => { isMounted = false; };
        }, []);

        const folderTreeData = useMemo(() => buildFolderTree(allItems), [allItems]);

        return { allItems, loading, folderTreeData };
    };

    const useInfiniteScroll = (allItems, loading, pageSize = 100) => {
        const [page, setPage] = useState(1);
        const sentinelRef = useRef(null);

        const displayedItems = useMemo(() => allItems.slice(0, page * pageSize), [allItems, page, pageSize]);

        useEffect(() => {
            if (loading || displayedItems.length >= allItems.length) return;
            const node = sentinelRef.current;
            if (!node) return;
            const obs = new IntersectionObserver(([entry]) => {
                if (entry.isIntersecting) setPage((p) => p + 1);
            }, {rootMargin: "4000px"});
            obs.observe(node);
            return () => obs.disconnect();
        }, [loading, displayedItems.length, allItems.length]);

        return { displayedItems, sentinelRef, hasMore: displayedItems.length < allItems.length };
    };

    const useReadTracker = () => {
        const [readItems, setReadItems] = useState(new Set());
        const processedRef = useRef(new Set());
        const batchQueueRef = useRef([]);
        const timerRef = useRef(null);

        const handleBecameVisible = useCallback((itemId) => {
            if (processedRef.current.has(itemId)) return;
            processedRef.current.add(itemId);
            batchQueueRef.current.push(itemId);

            if (!timerRef.current) {
                timerRef.current = setTimeout(() => {
                    timerRef.current = null;
                    const itemsToAdd = batchQueueRef.current;
                    batchQueueRef.current = [];
                    
                    if (itemsToAdd.length > 0) {
                        itemsToAdd.forEach(id => markItemAsRead(id));
                        setReadItems(prev => {
                            const next = new Set(prev);
                            itemsToAdd.forEach(id => next.add(id));
                            return next;
                        });
                    }
                }, 50);
            }
        }, []);

        return { readItems, handleBecameVisible };
    };

    const App = () => {
        // --- User Settings ---
        const {themeMode, toggleTheme} = useDarkMode();
        const {screenshotMode, toggleScreenshotMode} = useScreenshotMode();
        const {cardMode, toggleCardMode} = useCardMode();
        const {blockWords, setBlockWords} = useBlockWords();

        // --- UI States ---
        const [showStats, setShowStats] = useState(false);
        const [showFolderModal, setShowFolderModal] = useState(false);
        const [showBlockWordsModal, setShowBlockWordsModal] = useState(false);

        // --- Core Business Logic ---
        const { allItems, loading, folderTreeData } = useRssData();
        const { displayedItems, sentinelRef, hasMore } = useInfiniteScroll(allItems, loading);
        const { readItems, handleBecameVisible } = useReadTracker();

        // --- Derived Data ---
        const blockWordList = useMemo(() => blockWords.split(/[,\uFF0C]/).map(w => w.trim().toLowerCase()).filter(Boolean), [blockWords]);

        const isDarkMode = themeMode === "dark";
        useEffect(() => {
            document.body.style.backgroundColor = isDarkMode ? "#141414" : "#fff";
            document.body.style.color = isDarkMode ? "rgba(255,255,255,0.85)" : "rgba(0,0,0,0.88)";
        }, [isDarkMode]);

        return (
            <ConfigProvider theme={{
                cssVar: true,
                algorithm: isDarkMode ? theme.darkAlgorithm : theme.defaultAlgorithm,
                token: {fontFamily: "'PingFang SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans', sans-serif, 'Apple Color Emoji', 'Segoe UI Emoji', 'Segoe UI Symbol', 'Noto Color Emoji'"}
            }}>
                <Layout style={{minHeight: "100vh", background: "transparent"}}>
                    <Content className="main-content">
                        <StatsPanel total={allItems.length} read={readItems.size} displayed={displayedItems.length}
                                    loading={loading && !displayedItems.length} themeMode={themeMode}
                                    toggleTheme={toggleTheme} screenshotMode={screenshotMode}
                                    toggleScreenshotMode={toggleScreenshotMode} cardMode={cardMode}
                                    toggleCardMode={toggleCardMode} showStats={showStats}
                                    setShowFolderModal={setShowFolderModal}
                                    setShowBlockWordsModal={setShowBlockWordsModal}/>
                        <FolderTreeModal visible={showFolderModal} onClose={() => setShowFolderModal(false)} treeData={folderTreeData}/>
                        <BlockWordsModal visible={showBlockWordsModal} onClose={() => setShowBlockWordsModal(false)} blockWords={blockWords} setBlockWords={setBlockWords}/>
                        <List className="rss-list-container" rowKey="id" dataSource={displayedItems} renderItem={(item) => <RssItem
                            item={item} onBecameVisible={handleBecameVisible} screenshotMode={screenshotMode}
                            cardMode={cardMode} isRead={readItems.has(item.id)} blockWordList={blockWordList}/>}/>
                        <div ref={sentinelRef} style={{height: 20, marginBottom: 20}}/>
                        {loading && displayedItems.length > 0 && <Spin style={{marginTop: 24}}/>}
                        {!hasMore && displayedItems.length > 0 &&
                            <div style={{textAlign: "center", margin: "20px 0"}}><Text type="secondary">All items
                                loaded.</Text></div>}
                    </Content>
                </Layout>
                <FloatButton icon="⚙️" className="stats-toggle-btn" style={{right: 24, bottom: 84}}
                             onClick={() => setShowStats(!showStats)}/>
                <FloatButton.BackTop style={{right: 24, bottom: 24}}/>
            </ConfigProvider>
        );
    };

    ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
